[platformio]
default_envs = mega2560-waveshare

[env:mega2560-waveshare]
platform      = atmelavr
board         = megaatmega2560
framework     = arduino
monitor_speed = 115200

lib_deps =
    https://github.com/ImpulseAdventure/Waveshare_ILI9486.git
    moononournation/GFX Library for Arduino
    bodmer/TFT_eSPI
    lvgl/lvgl@^8.3.11                ; older version recommended for AVR/Mega stability
    paulstoffregen/XPT2046_Touchscreen

build_flags =
    -D GFX_BACKEND_WAVESHARE_ILI9486   ; ← change only this line to switch backends
    ; -D GFX_BACKEND_ARDUINO_GFX
    ; -D GFX_BACKEND_TFT_eSPI
    ; -D GFX_BACKEND_LVGL
    -I extras
    -include "extras/User_Setup.h"
    -D USER_SETUP_LOADED
    -include "User_Setup.h"            ; only active/effective when TFT_eSPI backend selected

[env:unor4wifi-tftespi]
platform      = renesas-ra
board         = uno_r4_wifi
framework     = arduino
monitor_speed = 115200

lib_deps =
    https://github.com/ImpulseAdventure/Waveshare_ILI9486.git
    moononournation/GFX Library for Arduino
    bodmer/TFT_eSPI
    lvgl/lvgl@^8.3.11
    paulstoffregen/XPT2046_Touchscreen

lib_ignore = FATFilesystem

;build_flags =
;    -D GFX_BACKEND_TFT_eSPI
;    -D ARDUINO_UNO_R4_WIFI
;    -I extras
;    -include "extras/User_Setup.h"
;    -Wno-cpp                   ; Suppress all preprocessor messages (#warning, #pragma message, etc.)
;    -Wno-pragmas               ; Suppress all #pragma messages (GCC/Clang)
;    -D USER_SETUP_LOADED
;    -include "User_Setup.h"
;    -DLV_CONF_INCLUDE_SIMPLE=1                ; Tells LVGL to use simple #include "lv_conf.h"
;    -DLV_CONF_PATH="${PROJECT_DIR}/extras/lv_conf.h"   ; Or use quotes if path has spaces

build_flags =
    -D GFX_BACKEND_TFT_eSPI
    -D ARDUINO_UNO_R4_WIFI
    -I extras
    -include "extras/User_Setup.h"
    -D USER_SETUP_LOADED
    -include "User_Setup.h"
    -DLV_CONF_INCLUDE_SIMPLE=1
    -DLV_USE_LOG=0                ; Optional: disables log-related code if not needed (quiets some)
    -D LV_CONF_SUPPRESS_DEFINE_CHECK=1  ; Hacky but works in some LVGL versions/forks to skip the pragma
    -Wno-cpp
    -Wno-pragmas
    -Wno-unused-parameter   ; Optional: quiets any other minor notes
    -Wno-maybe-uninitialized ; Optional: if you see any
